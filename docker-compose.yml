version: "3.9"

services:
  backend:
    build: .
    container_name: voice2gov_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DATABASE_NAME=voice2gov_db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEBUG=False
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - voice2gov_net

  mongo:
    image: mongo:7.0
    container_name: voice2gov_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voice2gov_net

volumes:
  mongo_data:

networks:
  voice2gov_net:
    driver: bridge
